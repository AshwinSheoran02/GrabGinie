<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Genie - YouTube Thumbnail</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            height: 100vh;
        }

        .thumbnail-container {
            /* Standard YouTube Thumbnail Size: 1280x720 */
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #00B14F 0%, #008f3f 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
        }

        /* Abstract glowing background effects */
        .glow {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%);
        }
        .glow-1 { top: -20%; left: -10%; width: 800px; height: 800px; }
        .glow-2 { bottom: -30%; right: -10%; width: 1000px; height: 1000px; }

        .content-left {
            flex: 1;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-height: 10;
        }

        .phone-mockup-right {
            flex: 0.8;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tag {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            width: fit-content;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .tag svg {
            margin-right: 12px;
        }

        .title {
            color: white;
            font-size: 85px;
            font-weight: 800;
            line-height: 1.1;
            margin: 0 0 20px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .title span {
            color: #ffeb3b; 
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 38px;
            font-weight: 500;
            line-height: 1.3;
            max-width: 600px;
        }

        /* Phone Mockup Styling */
        .phone-frame {
            width: 350px;
            height: 720px;
            background: white;
            border-radius: 40px;
            box-shadow: -20px 20px 50px rgba(0,0,0,0.3), inset 0 0 0 10px #1a1a1a;
            position: absolute;
            bottom: -80px;
            transform: rotate(-5deg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .phone-notch {
            width: 140px;
            height: 30px;
            background: #1a1a1a;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 100;
        }

        .phone-header {
            padding: 50px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greeting {
            color: #666;
            font-size: 14px;
        }
        .name {
            font-weight: bold;
            font-size: 24px;
            color: #333;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            background: #00B14F;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        .services-row {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            margin-top: 20px;
        }

        .serv-box {
            width: 90px;
            height: 90px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .serv-ride { background: #f0f4f8; }
        .serv-food { background: #fff8e1; border-bottom: 3px solid #ff9800; }
        .serv-mart { background: #fffde7; border-bottom: 3px solid #ffc107; }

        .genie-banner {
            margin: 30px 20px;
            background: #00B14F;
            border-radius: 16px;
            padding: 20px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 177, 79, 0.3);
        }

        .genie-title { font-weight: bold; font-size: 20px; margin-bottom: 5px; }
        .genie-sub { font-size: 14px; opacity: 0.9; }
        
        .floating-sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: -20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .mic-button {
            position: absolute;
            bottom: 50px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #00B14F;
            box-shadow: 0 10px 20px rgba(0,177,79,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>

    <div class="thumbnail-container">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        
        <div class="content-left">
            <div class="tag">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="sparkle">
                    <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z" fill="currentColor"/>
                </svg>
                AI Prototype Demo
            </div>
            
            <h1 class="title">Meet <span>Grab Genie</span></h1>
            
            <div class="subtitle">
                One Voice Request. <br>
                Multiple Services Orchestrated Instantly.
            </div>
        </div>

        <div class="phone-mockup-right">
            <div class="phone-frame">
                <div class="phone-notch"></div>
                
                <div class="phone-header">
                    <div>
                        <div class="greeting">Good evening,</div>
                        <div class="name">Ashwin</div>
                    </div>
                    <div class="avatar">A</div>
                </div>

                <div style="margin: 0 20px; padding: 15px; background: #f5f5f5; border-radius: 30px; color: #999;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 10px;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Where are you going?
                </div>

                <div class="services-row">
                    <div class="serv-box serv-ride">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00B14F" stroke-width="2"><path d="M3 10h18M5 10l2-6h10l2 6M4 14h16v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6z"></path><circle cx="7" cy="15" r="2" fill="#00B14F"/><circle cx="17" cy="15" r="2" fill="#00B14F"/></svg>
                        <span style="margin-top: 8px;">Ride</span>
                    </div>
                    <div class="serv-box serv-food">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00B14F" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
                        <span style="margin-top: 8px;">Food</span>
                    </div>
                    <div class="serv-box serv-mart">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00B14F" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                        <span style="margin-top: 8px;">Mart</span>
                    </div>
                </div>

                <div class="genie-banner">
                    <div class="genie-title">Try Grab Genie</div>
                    <div class="genie-sub">One request. Multi-service orchestration.</div>
                    
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%);">
                         <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z" fill="#fff"/>
                    </svg>
                </div>

                <div class="mic-button">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
