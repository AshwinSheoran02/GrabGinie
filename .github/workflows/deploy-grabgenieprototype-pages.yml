name: Deploy GrabGenie Prototype to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'grabgenieprototype/**'
      - '.github/workflows/deploy-grabgenieprototype-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: grabgenieprototype/package-lock.json

      - name: Install dependencies
        working-directory: grabgenieprototype
        run: npm ci

      - name: Build prototype
        working-directory: grabgenieprototype
        env:
          CI: false
          REACT_APP_AI_PROVIDER: gemini
          REACT_APP_GEMINI_API_KEY: ${{ secrets.REACT_APP_GEMINI_API_KEY }}
          REACT_APP_GEMINI_MODEL: gemini-1.5-flash
          REACT_APP_OPENAI_API_KEY: ''
          REACT_APP_OPENAI_MODEL: gpt-4o-mini
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: grabgenieprototype/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
